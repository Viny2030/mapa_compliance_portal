<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Capacitaciones — Monitor de Compliance</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#1a3a5c;--sec:#2196f3;--verde:#2e7d32;--rojo:#c62828;--naranja:#e65100;--bg:#f0f4f8;--card:#fff;--texto:#1a1a2e;--muted:#6b7280;--borde:#dde3ea}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--texto);padding-top:56px;line-height:1.6}
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--pri);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem}
.nav-brand{color:#fff;font-size:.95rem;font-weight:700;text-decoration:none}
.nav-back{color:#a8c7e8;font-size:.8rem;text-decoration:none}
.nav-back:hover{color:#fff}
.wrap{max-width:960px;margin:0 auto;padding:1.4rem .9rem}
.page-header{background:linear-gradient(135deg,var(--pri) 0%,#0d2137 100%);color:#fff;padding:1.6rem 1rem 1.2rem;margin-bottom:1.4rem}
.page-header h1{font-size:1.4rem;margin-bottom:.2rem}
.page-header p{opacity:.75;font-size:.85rem}
.card{background:var(--card);border-radius:10px;padding:1.2rem;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:1rem;border-top:3px solid var(--pri)}
.card h2{color:var(--pri);font-size:1rem;margin-bottom:.9rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1.2rem}
@media(max-width:640px){.grid4{grid-template-columns:repeat(2,1fr)}}
.kpi{text-align:center;padding:.8rem .5rem;border-radius:8px;border:1px solid var(--borde)}
.kpi-num{font-size:1.6rem;font-weight:800;line-height:1}
.kpi-label{font-size:.7rem;color:var(--muted);font-weight:600;margin-top:.2rem}
.kpi.verde .kpi-num{color:var(--verde)}.kpi.rojo .kpi-num{color:var(--rojo)}.kpi.naranja .kpi-num{color:var(--naranja)}.kpi.azul .kpi-num{color:var(--sec)}
.prog-wrap{margin:.25rem 0}
.prog-label{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted);margin-bottom:.18rem}
.prog-track{background:#e0e7ef;border-radius:4px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px}
.prog-fill.verde{background:var(--verde)}.prog-fill.naranja{background:var(--naranja)}.prog-fill.rojo{background:var(--rojo)}
/* Tabs */
.view-tabs{display:flex;gap:.3rem;margin-bottom:1rem;border-bottom:2px solid var(--borde);padding-bottom:.5rem}
.view-tab{background:none;border:none;font-size:.85rem;font-weight:600;color:var(--muted);padding:.35rem .8rem;border-radius:6px;cursor:pointer}
.view-tab.active{background:var(--pri);color:#fff}
/* Módulos */
.modulo-card{border:1px solid var(--borde);border-radius:10px;padding:1rem;margin-bottom:.7rem;background:#fafbfc}
.modulo-head{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap}
.modulo-titulo{font-size:.92rem;font-weight:700;color:var(--pri);flex:1}
.badge{display:inline-flex;align-items:center;font-size:.67rem;font-weight:700;padding:.13rem .45rem;border-radius:7px}
.badge-oblig{background:#fdecea;color:var(--rojo)}
.badge-opc{background:#e8f5e9;color:var(--verde)}
.badge-vence-urgent{background:#fdecea;color:var(--rojo)}
.badge-vence-prox{background:#fff3e0;color:var(--naranja)}
.badge-vence-ok{background:#e8f5e9;color:var(--verde)}
.modulo-meta{display:flex;gap:.5rem;flex-wrap:wrap;font-size:.77rem;color:var(--muted);margin-bottom:.5rem;align-items:center}
.btn{background:var(--pri);color:#fff;border:none;padding:.42rem 1rem;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{background:#0d2137}
.btn.verde{background:var(--verde)}.btn.verde:hover{background:#1b5e20}
.btn.gris{background:#6b7280}
.btn.rojo{background:var(--rojo)}
.btn-sm{padding:.28rem .65rem;font-size:.76rem}
/* Tabla empleados */
.emp-table{width:100%;border-collapse:collapse;font-size:.82rem}
.emp-table th{background:#f0f4f8;color:var(--pri);font-size:.72rem;font-weight:700;text-align:left;padding:.45rem .6rem;border-bottom:2px solid var(--borde)}
.emp-table td{padding:.4rem .6rem;border-bottom:1px solid var(--borde);vertical-align:middle}
.emp-table tr:last-child td{border-bottom:none}
.firma-badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.72rem;font-weight:700;padding:.18rem .5rem;border-radius:6px}
.firma-ok{background:#e8f5e9;color:var(--verde)}
.firma-pend{background:#fdecea;color:var(--rojo)}
/* Vista empleado - firma */
.firma-box{border:2px dashed var(--borde);border-radius:10px;padding:1.4rem;text-align:center;background:#f8fafc;margin-top:.7rem}
.firma-box.firmado{border-color:var(--verde);background:#f1f8e9}
.firma-ico{font-size:2.2rem;margin-bottom:.5rem}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.4rem;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.modal-header h3{color:var(--pri);font-size:.95rem;flex:1;padding-right:.5rem}
.close-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted)}
.form-group{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.65rem}
.form-group label{font-size:.76rem;font-weight:600;color:var(--pri)}
input,select,textarea{font-family:inherit;font-size:.85rem;padding:.45rem .7rem;border:1px solid var(--borde);border-radius:6px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--sec);border-color:var(--sec)}
.modal-footer{display:flex;gap:.4rem;justify-content:flex-end;margin-top:.9rem;padding-top:.7rem;border-top:1px solid var(--borde);flex-wrap:wrap}
/* Firma modal */
.firma-modal-box{border:2px dashed var(--borde);border-radius:8px;padding:1.2rem;text-align:center;background:#f8fafc;margin:1rem 0}
.firma-nombre-input{font-size:1.1rem;text-align:center;font-style:italic;border:none;border-bottom:2px solid var(--pri);border-radius:0;margin-bottom:.6rem}
.checkbox-wrap{display:flex;align-items:flex-start;gap:.5rem;background:#e8f5e9;border-radius:7px;padding:.7rem;margin-bottom:.7rem;cursor:pointer}
.checkbox-wrap input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:.15rem;cursor:pointer}
.checkbox-wrap label{font-size:.83rem;cursor:pointer}
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--pri);color:#fff;padding:.6rem 1rem;border-radius:8px;font-size:.84rem;font-weight:600;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s}
.toast.show{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:2rem;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a class="nav-brand" href="index.html">⚖️ Monitor de Compliance</a>
    <a class="nav-back" href="index.html">← Dashboard</a>
  </div>
</nav>

<div class="page-header">
  <div class="wrap" style="padding-top:0;padding-bottom:0">
    <h1>📚 Capacitaciones con Firma de Conformidad</h1>
    <p>Registro de lecturas, conformidades y trazabilidad de empleados · Art. 23 Ley 27.401</p>
  </div>
</div>

<div class="wrap">

  <div class="grid4" id="kpi-grid"></div>

  <!-- Tabs vista -->
  <div class="card">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setVista('admin',this)">👔 Vista Administrador</button>
      <button class="view-tab" onclick="setVista('empleado',this)">👤 Vista Empleado (Firma)</button>
    </div>

    <!-- Vista admin -->
    <div id="vista-admin">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem">
        <h2 style="font-size:1rem;color:var(--pri);margin:0">Módulos de capacitación</h2>
        <button class="btn btn-sm verde" onclick="abrirModalNuevoModulo()">+ Nuevo módulo</button>
      </div>
      <div id="modulos-list"></div>
    </div>

    <!-- Vista empleado -->
    <div id="vista-empleado" style="display:none">
      <div class="form-group" style="max-width:320px;margin-bottom:1rem">
        <label>¿Cuál es tu nombre?</label>
        <input type="text" id="emp-nombre" placeholder="Ej: Juan Pérez" oninput="renderVistaEmpleado()">
      </div>
      <div id="vista-emp-content"></div>
    </div>
  </div>

</div>

<!-- Modal nuevo módulo -->
<div class="modal-overlay" id="modal-modulo" onclick="cerrarModalModulo(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo módulo de capacitación</h3>
      <button class="close-btn" onclick="document.getElementById('modal-modulo').classList.remove('open')">✕</button>
    </div>
    <div class="form-group"><label>Nombre del módulo</label><input type="text" id="m-nombre" placeholder="Ej: Código de Ética y Conducta"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
      <div class="form-group"><label>Obligatorio</label><select id="m-oblig"><option value="1">Sí — obligatorio</option><option value="0">No — opcional</option></select></div>
      <div class="form-group"><label>Fecha límite</label><input type="date" id="m-fecha"></div>
    </div>
    <div class="form-group"><label>Destinatarios</label><input type="text" id="m-dest" placeholder="Ej: Todos, Gerencia, Comercial…"></div>
    <div class="form-group"><label>Descripción / contenido</label><textarea id="m-desc" placeholder="Resumen del contenido que el empleado certifica haber leído…"></textarea></div>
    <div class="modal-footer">
      <button class="btn gris btn-sm" onclick="document.getElementById('modal-modulo').classList.remove('open')">Cancelar</button>
      <button class="btn verde btn-sm" onclick="crearModulo()">Crear módulo →</button>
    </div>
  </div>
</div>

<!-- Modal detalle módulo + firmas -->
<div class="modal-overlay" id="modal-detalle" onclick="cerrarModalDetalle(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="detalle-titulo">Detalle del módulo</h3>
      <button class="close-btn" onclick="document.getElementById('modal-detalle').classList.remove('open')">✕</button>
    </div>
    <div id="detalle-body"></div>
    <div class="modal-footer">
      <button class="btn rojo btn-sm" onclick="eliminarModulo()">Eliminar módulo</button>
      <button class="btn gris btn-sm" onclick="document.getElementById('modal-detalle').classList.remove('open')">Cerrar</button>
    </div>
  </div>
</div>

<!-- Modal firma empleado -->
<div class="modal-overlay" id="modal-firma" onclick="cerrarModalFirma(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="firma-titulo">Firmar conformidad</h3>
      <button class="close-btn" onclick="document.getElementById('modal-firma').classList.remove('open')">✕</button>
    </div>
    <div id="firma-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
// ── Estado ────────────────────────────────────────────────────────────────
let modulos = JSON.parse(localStorage.getItem('cap_modulos') || 'null');
let vistaActiva = 'admin';
let idActivo = null;

if(!modulos){
  // Seed desde CONFIG si existe
  const baseModulos = (typeof CONFIG !== 'undefined' && CONFIG.capacitaciones) ? CONFIG.capacitaciones : [];
  modulos = baseModulos.map((c,i)=>({
    id:'MOD-'+String(i+1).padStart(3,'0'),
    nombre: typeof c.modulo==='object' ? c.modulo.es : c.modulo,
    obligatorio: c.obligatorio,
    fechaLimite: c.fecha_limite||'',
    destinatarios: typeof c.destinatarios==='object' ? c.destinatarios.es : (c.destinatarios||'Todos'),
    descripcion: 'Lectura y aprobación del material de formación correspondiente al módulo.',
    firmas: [],
    completado: c.completado||0,
  }));

  if(!modulos.length){
    modulos = [
      {id:'MOD-001',nombre:'Código de Ética y Conducta',obligatorio:true,fechaLimite:'2026-03-31',destinatarios:'Todos',descripcion:'El empleado certifica haber leído y comprendido el Código de Ética y Conducta de la empresa, comprometiéndose a actuar de acuerdo con sus principios.',firmas:[{nombre:'María García',fecha:'2026-01-15',hora:'09:32',ip:'192.168.1.10',declaracion:true},{nombre:'Carlos López',fecha:'2026-01-16',hora:'14:10',ip:'192.168.1.22',declaracion:true}],completado:88},
      {id:'MOD-002',nombre:'Introducción a la Ley 27.401',obligatorio:true,fechaLimite:'2026-03-31',destinatarios:'Todos',descripcion:'Formación sobre la Ley de Responsabilidad Penal Empresaria y sus implicancias para la empresa y los empleados.',firmas:[{nombre:'María García',fecha:'2026-01-20',hora:'11:05',ip:'192.168.1.10',declaracion:true}],completado:95},
      {id:'MOD-003',nombre:'Procedimientos en Contrataciones Públicas',obligatorio:true,fechaLimite:'2026-06-30',destinatarios:'Comercial, Compras',descripcion:'Normativa y procedimientos obligatorios para la participación en licitaciones y contrataciones con el Estado Nacional.',firmas:[],completado:72},
    ];
  }
  guardar();
}

let modoCounter = modulos.length + 1;

function guardar(){ localStorage.setItem('cap_modulos', JSON.stringify(modulos)); }

// ── KPIs ──────────────────────────────────────────────────────────────────
function renderKPIs(){
  const total = modulos.length;
  const obligatorios = modulos.filter(m=>m.obligatorio);
  const totalFirmas = modulos.reduce((a,m)=>a+(m.firmas||[]).length,0);
  const hoy = new Date();
  const vencidos = modulos.filter(m=>{
    if(!m.fechaLimite) return false;
    const pct = m.completado||0;
    return new Date(m.fechaLimite)<hoy && pct<100;
  }).length;
  const pctPromedio = total ? Math.round(modulos.reduce((a,m)=>a+(m.completado||0),0)/total) : 0;
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi azul"><div class="kpi-num">${total}</div><div class="kpi-label">Módulos activos</div></div>
    <div class="kpi naranja"><div class="kpi-num">${obligatorios.length}</div><div class="kpi-label">Obligatorios (Art. 23)</div></div>
    <div class="kpi verde"><div class="kpi-num">${totalFirmas}</div><div class="kpi-label">Firmas registradas</div></div>
    <div class="kpi ${vencidos>0?'rojo':'verde'}"><div class="kpi-num">${vencidos}</div><div class="kpi-label">Con vencimiento vencido</div></div>
  `;
}

// ── Vista admin ───────────────────────────────────────────────────────────
function renderAdmin(){
  const hoy = new Date();
  const cont = document.getElementById('modulos-list');
  if(!modulos.length){ cont.innerHTML='<div class="empty">📭 Sin módulos creados.</div>'; return; }
  cont.innerHTML = modulos.map(m=>{
    const pct = m.completado||0;
    const color = pct>=75?'verde':pct>=45?'naranja':'rojo';
    const firmas = m.firmas||[];
    let venceBadge='';
    if(m.fechaLimite){
      const dias = Math.round((new Date(m.fechaLimite)-hoy)/86400000);
      if(dias<0) venceBadge=`<span class="badge badge-vence-urgent">⚠️ Venció</span>`;
      else if(dias<30) venceBadge=`<span class="badge badge-vence-prox">⏰ ${dias}d</span>`;
      else venceBadge=`<span class="badge badge-vence-ok">📅 ${m.fechaLimite}</span>`;
    }
    return `<div class="modulo-card">
      <div class="modulo-head">
        <div class="modulo-titulo">${m.nombre}</div>
        <span class="badge ${m.obligatorio?'badge-oblig':'badge-opc'}">${m.obligatorio?'Obligatorio':'Opcional'}</span>
        ${venceBadge}
      </div>
      <div class="modulo-meta">
        <span>👥 ${m.destinatarios}</span>
        <span>✍️ ${firmas.length} firma(s)</span>
      </div>
      <div class="prog-wrap">
        <div class="prog-label"><span>Completitud declarada</span><span>${pct}%</span></div>
        <div class="prog-track"><div class="prog-fill ${color}" style="width:${pct}%"></div></div>
      </div>
      <div style="margin-top:.6rem;display:flex;gap:.4rem;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="verDetalle('${m.id}')">Ver firmas →</button>
        <button class="btn btn-sm gris" onclick="ajustarCompletado('${m.id}')">Ajustar %</button>
      </div>
    </div>`;
  }).join('');
}

// ── Vista empleado ────────────────────────────────────────────────────────
function setVista(v, btn){
  vistaActiva = v;
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('vista-admin').style.display = v==='admin'?'':'none';
  document.getElementById('vista-empleado').style.display = v==='empleado'?'':'none';
  if(v==='empleado') renderVistaEmpleado();
}

function renderVistaEmpleado(){
  const nombre = (document.getElementById('emp-nombre').value||'').trim();
  const cont = document.getElementById('vista-emp-content');
  if(!nombre){ cont.innerHTML=`<div style="color:var(--muted);font-size:.85rem">👆 Ingresá tu nombre para ver tus capacitaciones pendientes.</div>`; return; }

  const hoy = new Date();
  cont.innerHTML = modulos.map(m=>{
    const yaFirmado = (m.firmas||[]).some(f=>f.nombre.toLowerCase()===nombre.toLowerCase());
    const pct = m.completado||0;
    let venceBadge='';
    if(m.fechaLimite){
      const dias = Math.round((new Date(m.fechaLimite)-hoy)/86400000);
      if(dias<0) venceBadge=`<span class="badge badge-vence-urgent">⚠️ Venció hace ${Math.abs(dias)} días</span>`;
      else venceBadge=`<span class="badge badge-vence-prox">📅 Vence en ${dias} días</span>`;
    }
    return `<div class="modulo-card">
      <div class="modulo-head">
        <div class="modulo-titulo">${m.nombre}</div>
        <span class="badge ${m.obligatorio?'badge-oblig':'badge-opc'}">${m.obligatorio?'Obligatorio':'Opcional'}</span>
        ${venceBadge}
      </div>
      <div class="modulo-meta"><span>👥 ${m.destinatarios}</span></div>
      ${m.descripcion ? `<p style="font-size:.82rem;color:#444;margin:.4rem 0;line-height:1.5">${m.descripcion}</p>` : ''}
      <div class="firma-box ${yaFirmado?'firmado':''}">
        ${yaFirmado
          ? `<div class="firma-ico">✅</div><div style="font-weight:700;color:var(--verde)">Conformidad firmada</div><div style="font-size:.78rem;color:var(--muted);margin-top:.25rem">Registrada como "${nombre}"</div>`
          : `<div class="firma-ico">✍️</div><div style="font-weight:600;margin-bottom:.5rem">Aún no firmaste este módulo</div><button class="btn verde" onclick="abrirModalFirma('${m.id}','${nombre.replace(/'/g,"\\'")}')">Firmar conformidad →</button>`
        }
      </div>
    </div>`;
  }).join('');
}

// ── Modal firma ───────────────────────────────────────────────────────────
function abrirModalFirma(modId, nombre){
  idActivo = modId;
  const m = modulos.find(x=>x.id===modId);
  if(!m) return;
  document.getElementById('firma-titulo').textContent = `Firmar: ${m.nombre}`;
  document.getElementById('firma-body').innerHTML = `
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:.8rem">Leé el siguiente texto antes de firmar.</p>
    <div style="background:#f0f4f8;border-radius:8px;padding:.9rem;font-size:.83rem;line-height:1.6;margin-bottom:.9rem;border-left:3px solid var(--sec)">
      ${m.descripcion || 'Certifico haber leído y comprendido el contenido de este módulo de capacitación.'}
    </div>
    <div class="checkbox-wrap" onclick="toggleCheck()">
      <input type="checkbox" id="chk-declaracion" onchange="toggleBtnFirmar()">
      <label for="chk-declaracion">Declaro haber leído y comprendido el contenido del módulo <strong>"${m.nombre}"</strong> y me comprometo a actuar conforme a lo indicado.</label>
    </div>
    <div class="firma-modal-box">
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:.4rem">Firmá ingresando tu nombre completo</div>
      <input class="firma-nombre-input" type="text" id="firma-nombre-inp" value="${nombre}" placeholder="Tu nombre completo">
      <div style="font-size:.72rem;color:var(--muted)">Fecha y hora: ${new Date().toLocaleString('es-AR')}</div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:.4rem;margin-top:.5rem">
      <button class="btn gris btn-sm" onclick="document.getElementById('modal-firma').classList.remove('open')">Cancelar</button>
      <button class="btn verde btn-sm" id="btn-confirmar-firma" disabled onclick="confirmarFirma()">✍️ Confirmar firma</button>
    </div>
  `;
  document.getElementById('modal-firma').classList.add('open');
}

function toggleCheck(){ const c=document.getElementById('chk-declaracion'); if(c){c.checked=!c.checked; toggleBtnFirmar();} }
function toggleBtnFirmar(){ const c=document.getElementById('chk-declaracion'); const b=document.getElementById('btn-confirmar-firma'); if(c&&b) b.disabled=!c.checked; }

function confirmarFirma(){
  const nombre = (document.getElementById('firma-nombre-inp').value||'').trim();
  if(!nombre){ toast('⚠️ Ingresá tu nombre para firmar'); return; }
  const m = modulos.find(x=>x.id===idActivo);
  if(!m) return;
  if(!m.firmas) m.firmas=[];
  if(m.firmas.some(f=>f.nombre.toLowerCase()===nombre.toLowerCase())){
    toast('Ya firmaste este módulo'); return;
  }
  const now = new Date();
  m.firmas.push({
    nombre, declaracion:true,
    fecha: now.toISOString().slice(0,10),
    hora: now.toTimeString().slice(0,5),
    ip: '(registrado)',
  });
  guardar();
  document.getElementById('modal-firma').classList.remove('open');
  renderKPIs(); renderAdmin(); renderVistaEmpleado();
  toast(`✅ Firma de ${nombre} registrada`);
}

// ── Modal detalle firmas ──────────────────────────────────────────────────
function verDetalle(id){
  idActivo = id;
  const m = modulos.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('detalle-titulo').textContent = m.nombre;
  const firmas = m.firmas||[];
  document.getElementById('detalle-body').innerHTML = `
    <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem">
      <span class="badge ${m.obligatorio?'badge-oblig':'badge-opc'}">${m.obligatorio?'Obligatorio':'Opcional'}</span>
      ${m.fechaLimite?`<span class="badge badge-vence-prox">📅 Límite: ${m.fechaLimite}</span>`:''}
      <span class="badge" style="background:#e3f2fd;color:#0d47a1">👥 ${m.destinatarios}</span>
    </div>
    <p style="font-size:.83rem;color:#444;margin-bottom:1rem;line-height:1.5">${m.descripcion||''}</p>
    <h4 style="font-size:.85rem;color:var(--pri);margin-bottom:.5rem">✍️ Firmas registradas (${firmas.length})</h4>
    ${firmas.length
      ? `<table class="emp-table">
          <thead><tr><th>Nombre</th><th>Fecha</th><th>Hora</th><th>Declaración</th><th></th></tr></thead>
          <tbody>
            ${firmas.map((f,idx)=>`<tr>
              <td><strong>${f.nombre}</strong></td>
              <td>${f.fecha}</td>
              <td>${f.hora}</td>
              <td><span class="firma-badge firma-ok">✅ Conforme</span></td>
              <td><button class="btn rojo btn-sm" onclick="eliminarFirma('${id}',${idx})">✕</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`
      : `<div class="empty" style="padding:1rem">Sin firmas registradas aún.</div>`
    }
    <div style="margin-top:.8rem;padding:.6rem;background:#f0f4f8;border-radius:7px;font-size:.77rem;color:var(--muted)">
      📋 Este registro es válido como evidencia de capacitación ante la Oficina Anticorrupción (RITE) y auditores externos.
    </div>
  `;
  document.getElementById('modal-detalle').classList.add('open');
}

function eliminarFirma(modId, idx){
  if(!confirm('¿Eliminar esta firma?')) return;
  const m = modulos.find(x=>x.id===modId);
  if(!m) return;
  m.firmas.splice(idx,1);
  guardar(); verDetalle(modId); renderKPIs(); renderAdmin();
  toast('Firma eliminada');
}

function eliminarModulo(){
  if(!confirm('¿Eliminar este módulo y todas sus firmas?')) return;
  modulos = modulos.filter(x=>x.id!==idActivo);
  guardar(); renderKPIs(); renderAdmin();
  document.getElementById('modal-detalle').classList.remove('open');
  toast('Módulo eliminado');
}

function ajustarCompletado(id){
  const m = modulos.find(x=>x.id===id);
  if(!m) return;
  const nuevo = prompt(`% de completitud para "${m.nombre}" (0-100):`, m.completado||0);
  if(nuevo===null) return;
  m.completado = Math.min(100, Math.max(0, parseInt(nuevo)||0));
  guardar(); renderKPIs(); renderAdmin();
  toast('Completitud actualizada');
}

// ── Nuevo módulo ──────────────────────────────────────────────────────────
function abrirModalNuevoModulo(){ document.getElementById('modal-modulo').classList.add('open'); }

function crearModulo(){
  const nombre = document.getElementById('m-nombre').value.trim();
  if(!nombre){ toast('⚠️ Ingresá el nombre del módulo'); return; }
  const nuevo = {
    id:'MOD-'+String(modoCounter).padStart(3,'0'),
    nombre,
    obligatorio: document.getElementById('m-oblig').value==='1',
    fechaLimite: document.getElementById('m-fecha').value,
    destinatarios: document.getElementById('m-dest').value.trim()||'Todos',
    descripcion: document.getElementById('m-desc').value.trim(),
    firmas: [],
    completado: 0,
  };
  modoCounter++;
  modulos.push(nuevo);
  guardar(); renderKPIs(); renderAdmin();
  document.getElementById('modal-modulo').classList.remove('open');
  ['m-nombre','m-fecha','m-dest','m-desc'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  toast(`✅ ${nuevo.id} creado`);
}

function cerrarModalModulo(e){ if(e.target===document.getElementById('modal-modulo')) document.getElementById('modal-modulo').classList.remove('open'); }
function cerrarModalDetalle(e){ if(e.target===document.getElementById('modal-detalle')) document.getElementById('modal-detalle').classList.remove('open'); }
function cerrarModalFirma(e){ if(e.target===document.getElementById('modal-firma')) document.getElementById('modal-firma').classList.remove('open'); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

renderKPIs();
renderAdmin();
</script>
</body>
</html>
