<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Compliance — Acceso</title>
<style>
  :root {
    --pri: #1a3a5c; --sec: #2196f3; --fondo: #f0f4f8;
    --borde: #dde3ea; --texto: #1e293b; --error: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a3a5c 0%, #2196f3 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo h1 { color: var(--pri); font-size: 1.4rem; font-weight: 800; }
  .logo p { color: #64748b; font-size: .85rem; margin-top: .3rem; }
  label { font-size: .82rem; color: #475569; font-weight: 600; display: block; margin-bottom: .35rem; }
  input {
    width: 100%; padding: .7rem .9rem; border: 1.5px solid var(--borde);
    border-radius: 8px; font-size: .9rem; color: var(--texto);
    outline: none; transition: border .2s;
  }
  input:focus { border-color: var(--sec); }
  .field { margin-bottom: 1.2rem; }
  .btn {
    width: 100%; padding: .85rem; background: var(--sec);
    color: #fff; border: none; border-radius: 8px; font-size: 1rem;
    font-weight: 700; cursor: pointer; transition: background .2s; margin-top: .5rem;
  }
  .btn:hover { background: #1976d2; }
  .btn:disabled { background: #93c5fd; cursor: not-allowed; }
  .error {
    background: #fef2f2; border: 1px solid #fca5a5; color: var(--error);
    border-radius: 8px; padding: .7rem 1rem; font-size: .84rem;
    margin-bottom: 1rem; display: none;
  }
  .footer { text-align: center; margin-top: 1.5rem; font-size: .78rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>⚖️ Portal Compliance</h1>
    <p>Acceso para consultores</p>
  </div>
  <div class="error" id="error-msg"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="consultor@empresa.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn-login" onclick="login()">Ingresar</button>
  <div class="footer">Portal Multi-empresa v2.0 · Ecosistema Transparencia</div>
</div>

<script>
async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('btn-login');

  if (!email || !password) {
    errEl.textContent = 'Completá email y contraseña.';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Ingresando...';
  errEl.style.display = 'none';

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (resp.ok) {
      window.location.href = '/portal';
    } else {
      const d = await resp.json();
      errEl.textContent = d.detail || 'Credenciales incorrectas.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  } catch (e) {
    errEl.textContent = 'Error de conexión.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
}

// Enter para login
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
